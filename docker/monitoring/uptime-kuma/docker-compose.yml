version: "3.9"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    labels:
      - "wud.watch=false"
      - "wud.tag.include=^2($|\\.)"
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - ${UPTIME_KUMA_DATA_PATH}:/app/data
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring
    driver: bridge
