version: "3.9"

services:
  nginxproxymanager:
    container_name: nginx-proxy-manager
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"
    ports:
      - "${NPM_HTTP_PORT}:80"
      - "${NPM_HTTPS_PORT}:443"
      - "${NPM_ADMIN_PORT}:81"
    volumes:
      - ${NPM_DATA_PATH}:/data
      - ${NPM_LETSENCRYPT_PATH}:/etc/letsencrypt
    environment:
      TZ: ${TZ}
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    driver: bridge
