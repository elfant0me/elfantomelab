version: "3.9"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    labels:
      - "wud.watch=false"
      - "wud.watch.digest=true"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${JELLYFIN_HTTP_PORT}:8096"      # HTTP
      - "${JELLYFIN_HTTPS_PORT}:8920"     # HTTPS (optionnel)
      - "${JELLYFIN_DLNAPORT}:7359/udp"   # Découverte locale DLNA
      - "${JELLYFIN_SSDPPORT}:1900/udp"   # SSDP / UPnP
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${JELLYFIN_CONFIG_PATH}:/config
      - ${MEDIA_MOVIES_PATH}:/movie
      - ${MEDIA_SERIES_PATH}:/serie
      - ${MEDIA_MUSIC_PATH}:/mp3
      - ${JELLYFIN_TRANSCODE_PATH}:/transcode
      - ${FONTCONFIG_PATH}:/opt/vc/lib
    restart: unless-stopped
    networks:
      - mediaapps

networks:
  mediaapps:
    name: mediaapps
    driver: bridge
