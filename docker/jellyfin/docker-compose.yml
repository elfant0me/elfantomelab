version: "3.9"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    labels:
      - "wud.watch=false"
      - "wud.watch.digest=true"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    ports:
      - "${JELLYFIN_HTTP_PORT}:8096"
      - "${JELLYFIN_HTTPS_PORT}:8920"
      - "${JELLYFIN_DLNAPORT}:7359/udp"
      - "${JELLYFIN_SSDPPORT}:1900/udp"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${JELLYFIN_CONFIG_PATH}:/config
      - ${MEDIA_MOVIES_PATH}:/media/movies
      - ${MEDIA_SERIES_PATH}:/media/series
      - ${MEDIA_MUSIC_PATH}:/media/music
      - ${JELLYFIN_TRANSCODE_PATH}:/transcode
    restart: unless-stopped
    networks:
      - mediaapps

networks:
  mediaapps:
    name: mediaapps
    driver: bridge
