version: "3.9"

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlar
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    labels:
      - "wud.watch=false"
      - "wud.watch.digest=true"
    volumes:
      - ${CONFIG_PATH}/prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - arrstack

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonar
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    labels:
      - "wud.watch=false"
      - "wud.watch.digest=true"
    volumes:
      - ${CONFIG_PATH}/sonarr/config:/config
      - ${MEDIA_PATH}/Serie:/Serie
      - ${MEDIA_PATH}/Serie:${MEDIA_PATH}/Serie
      - ${MEDIA_PATH}/download:${MEDIA_PATH}/download
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - arrstack

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radar
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    labels:
      - "wud.watch=false"
      - "wud.watch.digest=true"
    volumes:
      - ${CONFIG_PATH}/radarr/config:/config
      - ${MEDIA_PATH}/Movie:${MEDIA_PATH}/Movie
      - ${MEDIA_PATH}/download:${MEDIA_PATH}/download
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - arrstack

networks:
  arrstack:
    name: arrstack
    driver: bridge
