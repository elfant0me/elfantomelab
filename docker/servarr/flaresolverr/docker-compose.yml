version: "3.9"

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_HTML: ${LOG_HTML}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER}
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      UMASK: ${UMASK}
    ports:
      - "${FLARESOLVERR_PORT}:8191"
    mem_limit: ${FLARESOLVERR_MEM}
    restart: unless-stopped
    networks:
      - mediaapps
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

networks:
  mediaapps:
    name: mediaapps
    driver: bridge
